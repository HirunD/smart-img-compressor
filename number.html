<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimic | Numeric Renamer</title>
    <style>
        :root {
            --bg: #0f1113;
            --card-bg: #16191c;
            --accent: #00d1b2;
            --text-main: #f5f5f5;
            --text-dim: #9ca3af;
            --border: #2d3339;
            --input-bg: #0a0c0e;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            padding: 20px;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        header { text-align: center; margin-bottom: 24px; }
        h2 { margin: 0; font-size: 1.4rem; letter-spacing: -0.02em; font-weight: 800; }
        p { color: var(--text-dim); font-size: 0.8rem; margin: 4px 0 0 0; }

        .config-row {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 12px;
            margin-bottom: 20px;
            text-align: left;
        }

        label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--text-dim);
            display: block;
            margin-bottom: 6px;
            letter-spacing: 0.05em;
        }

        input[type="text"], input[type="number"] {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: var(--accent);
            outline: none;
            box-sizing: border-box;
            font-family: inherit;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.01);
            margin-bottom: 24px;
        }

        .drop-zone:hover { border-color: var(--accent); background: rgba(0, 209, 178, 0.03); }
        .drop-zone span { color: var(--text-dim); font-size: 0.9rem; }

        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

        #status {
            margin-top: 20px;
            font-family: 'SF Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            background: #000;
            padding: 12px;
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid var(--border);
            display: none;
            text-align: left;
        }

        .back-link {
            display: block;
            margin-top: 20px;
            font-size: 0.75rem;
            color: var(--text-dim);
            text-decoration: none;
            text-align: center;
        }
        .back-link:hover { color: var(--accent); }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Numeric Renamer</h2>
        <p>Batch sequence naming for VFX & Delivery</p>
    </header>

    <div class="config-row">
        <div>
            <label>Prefix (Optional)</label>
            <input type="text" id="prefix" placeholder="e.g. Asset_">
        </div>
        <div>
            <label>Start From</label>
            <input type="number" id="startNum" value="1" min="0">
        </div>
    </div>

    <div class="drop-zone" id="dropZone">
        <span id="label">Drop Images to Rename</span>
        <input type="file" id="fileInput" multiple accept="image/*" style="display:none">
    </div>

    <button id="execBtn">Rename & Download All</button>
    <div id="status">Ready</div>

    <a href="index.html" class="back-link">← Back to Dashboard</a>
</div>

<script src="number.js"></script>
</body>
</html>
