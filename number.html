<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Numeric Renamer</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        body { font-family: sans-serif; display: flex; justify-content: center; padding: 50px; background: #1a1a1a; color: white; }
        .card { background: #2a2a2a; padding: 30px; border-radius: 12px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); text-align: center; }
        input { margin: 20px 0; display: block; width: 100%; }
        button { background: #e91e63; color: white; border: none; padding: 12px 25px; border-radius: 6px; cursor: pointer; font-weight: bold; }
        button:disabled { background: #555; }
        #status { margin-top: 20px; font-family: monospace; color: #00ff00; }
    </style>
</head>
<body>

<div class="card">
    <h2>Simple Numeric Renamer</h2>
    <p>Upload images to rename them to 1, 2, 3...</p>
    
    <input type="file" id="files" multiple accept="image/*">
    <button id="startBtn">Rename & Download</button>
    
    <div id="status">Ready</div>
</div>

<script src="number.js"></script>
</body>
</html>
