<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimic | Professional Image Processor</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #0f1113;
            --card-bg: #16191c;
            --accent: #00d1b2;
            --text-main: #f5f5f5;
            --text-dim: #9ca3af;
            --border: #2d3339;
            --input-bg: #0a0c0e;
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
            -webkit-font-smoothing: antialiased;
        }

        .container {
            width: 100%;
            max-width: 440px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0, 0, 0, 0.4);
        }

        header {
            text-align: center;
            margin-bottom: 32px;
        }

        h2 {
            font-size: 1.5rem;
            font-weight: 700;
            letter-spacing: -0.025em;
            margin: 0 0 8px 0;
        }

        p {
            color: var(--text-dim);
            font-size: 0.875rem;
            margin: 0;
        }

        /* Target Size Input */
        .control-group {
            margin-bottom: 24px;
        }

        .label-wrapper {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 10px;
        }

        label {
            font-size: 0.75rem;
            font-weight: 600;
            text-transform: uppercase;
            letter-spacing: 0.05em;
            color: var(--text-dim);
        }

        .input-container {
            position: relative;
            display: flex;
            align-items: center;
        }

        #sizeLimit {
            width: 100%;
            background: var(--input-bg);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--accent);
            font-family: 'SF Mono', monospace;
            font-size: 1rem;
            outline: none;
            transition: border-color 0.2s;
        }

        #sizeLimit:focus { border-color: var(--accent); }
        #sizeLimit::-webkit-inner-spin-button, 
        #sizeLimit::-webkit-outer-spin-button { -webkit-appearance: none; margin: 0; }

        .unit-badge {
            position: absolute;
            right: 16px;
            font-size: 0.7rem;
            font-weight: 700;
            color: var(--text-dim);
            pointer-events: none;
        }

        /* Drop Zone */
        .drop-zone {
            position: relative;
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            transition: all 0.2s ease;
            background: rgba(255, 255, 255, 0.01);
            cursor: pointer;
            margin-bottom: 24px;
        }

        .drop-zone.drag-over {
            border-color: var(--accent);
            background: rgba(0, 209, 178, 0.05);
            transform: scale(1.01);
        }

        .drop-zone input {
            position: absolute;
            inset: 0;
            opacity: 0;
            cursor: pointer;
        }

        #fileLabel { font-size: 0.9rem; color: var(--text-dim); }

        /* Preview Grid */
        .preview-grid {
            display: grid;
            grid-template-columns: repeat(auto-fill, minmax(70px, 1fr));
            gap: 10px;
            margin-bottom: 24px;
            max-height: 180px;
            overflow-y: auto;
            padding-right: 4px;
        }

        .preview-grid::-webkit-scrollbar { width: 4px; }
        .preview-grid::-webkit-scrollbar-thumb { background: var(--border); border-radius: 10px; }

        .preview-item {
            aspect-ratio: 1;
            border-radius: 6px;
            overflow: hidden;
            border: 1px solid var(--border);
            background: var(--input-bg);
        }

        .preview-item img {
            width: 100%;
            height: 100%;
            object-fit: cover;
            opacity: 0.7;
        }

        /* Action Button */
        button {
            background-color: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            width: 100%;
            border-radius: 8px;
            font-size: 0.95rem;
            font-weight: 700;
            cursor: pointer;
            transition: all 0.2s;
        }

        button:hover { opacity: 0.9; transform: translateY(-1px); }
        button:disabled { background-color: var(--border); color: var(--text-dim); cursor: not-allowed; transform: none; }

        #status {
            margin-top: 24px;
            font-family: 'SF Mono', monospace;
            font-size: 0.75rem;
            color: var(--accent);
            background: #000;
            padding: 14px;
            border-radius: 8px;
            border: 1px solid var(--border);
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .footer-note {
            text-align: center;
            font-size: 0.65rem;
            color: var(--text-dim);
            margin-top: 24px;
            text-transform: uppercase;
            letter-spacing: 0.1em;
            opacity: 0.5;
        }
    </style>
</head>
<body>

    <div class="container">
        <header>
            <h2>Mimic</h2>
            <p>High-Efficiency Asset Processor</p>
        </header>

        <div class="control-group">
            <div class="label-wrapper">
                <label>Target Threshold</label>
            </div>
            <div class="input-container">
                <input type="number" id="sizeLimit" value="100" min="10">
                <span class="unit-badge">KB</span>
            </div>
        </div>

        <div class="drop-zone" id="dropZone">
            <span id="fileLabel">Drop images or click to browse</span>
            <input type="file" id="upload" multiple accept="image/*">
        </div>

        <div id="previewGrid" class="preview-grid"></div>

        <button id="runBtn">Run Batch Process</button>

        <div id="status">System Ready</div>
        
        <div class="footer-note">Secure Local Processing • v2.0</div>
    </div>

    <script src="index.js" defer></script>
</body>
</html>
