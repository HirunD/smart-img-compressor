<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimic | Universal Series Formatter</title>
    <style>
        :root {
            --bg: #0f1113;
            --card-bg: #16191c;
            --accent: #00f2ff;
            --text-main: #f5f5f5;
            --text-dim: #9ca3af;
            --border: #2d3339;
            --input-bg: #0a0c0e;
            --recipe-color: #ffca00;
        }

        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            padding: 40px;
            margin: 0;
        }

        .container { max-width: 1300px; margin: 0 auto; }
        
        header { margin-bottom: 30px; }
        h1 { color: var(--accent); font-size: 1.8rem; margin: 0; letter-spacing: -0.04em; }
        p { color: var(--text-dim); font-size: 0.9rem; }

        textarea { 
            width: 100%; height: 180px; 
            background: var(--input-bg); border: 1px solid var(--border); 
            color: var(--accent); padding: 15px; border-radius: 12px; 
            font-family: 'SF Mono', monospace; font-size: 0.8rem;
            outline: none; box-sizing: border-box;
        }

        .btn-group { margin-top: 15px; display: flex; align-items: center; gap: 15px; }
        
        button { 
            background: var(--accent); color: #000; border: none; 
            padding: 12px 24px; border-radius: 8px; font-weight: 700; 
            cursor: pointer; transition: 0.2s;
        }
        
        button:hover { opacity: 0.9; transform: translateY(-2px); }

        #output-container { margin-top: 40px; display: none; }
        
        .table-wrapper {
            overflow-x: auto;
            border: 1px solid var(--border);
            border-radius: 12px;
            background: var(--card-bg);
        }

        table { width: 100%; border-collapse: collapse; font-size: 11px; }
        th, td { border-bottom: 1px solid var(--border); padding: 12px; text-align: left; }
        th { background: #1a1d21; color: var(--text-dim); text-transform: uppercase; font-size: 0.7rem; letter-spacing: 0.05em; }
        
        .tag-series { background: #333; color: #fff; padding: 2px 6px; border-radius: 4px; font-size: 10px; font-weight: bold; }
        .tag-recipe { color: #ffca00; font-weight: bold; }
        .title-text { color: var(--accent); font-weight: 600; }

        #recipe-count { color: var(--recipe-color); font-weight: bold; font-size: 0.9rem; }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h1>Universal Recipe Formatter</h1>
        <p>Works for <strong>TikTok & Instagram</strong> exports. Filters recipes and sorts into series.</p>
    </header>
    
    <textarea id="inputData" placeholder="Paste JSON data from TikTok or Instagram export here..."></textarea>
    
    <div class="btn-group">
        <button onclick="formatData()">1. Process Data</button>
        <button id="copyBtn" style="background: #ffca00; display:none;" onclick="copyRecipesOnly()">2. Copy Recipes for Google Sheets</button>
        <span id="recipe-count"></span>
    </div>

    <div id="output-container">
        <div class="table-wrapper">
            <table id="resultTable">
                <thead>
                    <tr>
                        <th>#</th>
                        <th>Series</th>
                        <th>Title</th>
                        <th>Link</th>
                        <th>Status</th>
                    </tr>
                </thead>
                <tbody id="tableBody"></tbody>
            </table>
        </div>
    </div>
</div>

<script>
    const foodKeywords = ['recipe', 'curry', 'oil', 'salt', 'ingredients', 'cook', 'boiled', 'taste', 'mashed', 'prawn', 'potato', 'mustard', 'sugar', 'paste', 'coconut', 'milk', 'tarka', 'dal', 'roti', 'paratha', 'masala'];

    function getSeries(caption) {
        const text = caption.toLowerCase();
        if (text.includes('indian 101')) {
            if (text.includes('bread series')) return "Indian 101: Bread Series";
            if (text.includes('west india')) return "Indian 101: West";
            if (text.includes('south india')) return "Indian 101: South";
            if (text.includes('east india')) return "Indian 101: East";
            if (text.includes('north india')) return "Indian 101: North";
            return "Indian 101";
        }
        if (text.includes('simply sri lankan') || text.includes('simply srilankan')) return "Simply Sri Lankan";
        if (text.includes('diwali made simple')) return "Diwali Made Simple";
        if (text.includes('quick christmas')) return "Quick Christmas";
        return "Etc";
    }

    function getTitle(text) {
        // Matches first line or first sentence
        const match = text.match(/^.*?[.!?](\s|$)|^[^\n]+/);
        return match ? match[0].trim() : text.trim();
    }

    function formatData() {
        const raw = document.getElementById('inputData').value;
        const tbody = document.getElementById('tableBody');
        tbody.innerHTML = '';
        let count = 0;
        
        try {
            const data = JSON.parse(raw);
            data.forEach(item => {
                const isRecipe = foodKeywords.some(word => item.caption.toLowerCase().includes(word));
                if(isRecipe) count++;

                const seriesName = getSeries(item.caption);
                const title = getTitle(item.caption);

                const row = `<tr>
                    <td>${item.index}</td>
                    <td><span class="tag-series">${seriesName}</span></td>
                    <td class="title-text">${title}</td>
                    <td><a href="${item.link}" target="_blank" style="color:var(--accent)">Link</a></td>
                    <td class="${isRecipe ? 'tag-recipe' : ''}">${isRecipe ? '✔ Recipe' : '—'}</td>
                </tr>`;
                tbody.innerHTML += row;
            });

            document.getElementById('output-container').style.display = 'block';
            document.getElementById('copyBtn').style.display = 'inline-block';
            document.getElementById('recipe-count').innerText = `Total Recipes Found: ${count}`;
        } catch (e) {
            alert("Error: Invalid JSON format. Please paste the full text from your export file.");
        }
    }

    function copyRecipesOnly() {
        const raw = document.getElementById('inputData').value;
        let data;
        try {
            data = JSON.parse(raw);
        } catch(e) { return; }
        
        // This creates the header and the data rows separated by tabs (\t)
        // This is the format Google Sheets expects to create columns.
        let tsv = "Index\tSeries\tTitle\tLink\tFull Caption\tScraped Date\n";
        let copiedCount = 0;
        
        data.forEach(item => {
            const isRecipe = foodKeywords.some(word => item.caption.toLowerCase().includes(word));
            
            if (isRecipe) {
                const seriesName = getSeries(item.caption);
                const title = getTitle(item.caption);
                
                // Clean values for TSV (removing extra newlines and tabs from inside text)
                const clean = (val) => val ? val.toString().replace(/\t/g, " ").replace(/\n/g, " ").replace(/"/g, '""') : "";

                const row = [
                    item.index,
                    seriesName,
                    title,
                    item.link,
                    clean(item.caption),
                    item.posted_at || item.scraped_at || "N/A"
                ].join('\t');
                
                tsv += row + '\n';
                copiedCount++;
            }
        });

        // Use the modern Clipboard API
        navigator.clipboard.writeText(tsv).then(() => {
            alert(`Copied ${copiedCount} recipes! Go to Google Sheets and press Ctrl+V (or Cmd+V).`);
        }).catch(err => {
            // Fallback for older browsers
            const el = document.createElement('textarea');
            el.value = tsv;
            document.body.appendChild(el);
            el.select();
            document.execCommand('copy');
            document.body.removeChild(el);
            alert(`Copied ${copiedCount} recipes!`);
        });
    }
</script>

</body>
</html>
