<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Mimic | Image Transform</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/jszip/3.10.1/jszip.min.js"></script>
    <style>
        :root {
            --bg: #0f1113;
            --card-bg: #16191c;
            --accent: #00d1b2;
            --text-main: #f5f5f5;
            --text-dim: #9ca3af;
            --border: #2d3339;
        }

        body {
            font-family: 'Inter', sans-serif;
            background-color: var(--bg);
            color: var(--text-main);
            display: flex;
            align-items: center;
            justify-content: center;
            min-height: 100vh;
            margin: 0;
        }

        .container {
            width: 100%;
            max-width: 480px;
            background: var(--card-bg);
            padding: 32px;
            border-radius: 16px;
            border: 1px solid var(--border);
            box-shadow: 0 20px 40px rgba(0,0,0,0.4);
        }

        header { text-align: center; margin-bottom: 24px; }
        h2 { margin: 0; font-size: 1.4rem; letter-spacing: -0.02em; }
        p { color: var(--text-dim); font-size: 0.8rem; margin: 4px 0 0 0; }

        .config-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
            margin-bottom: 24px;
        }

        label {
            font-size: 0.65rem;
            text-transform: uppercase;
            font-weight: 800;
            color: var(--text-dim);
            display: block;
            margin-bottom: 8px;
            letter-spacing: 0.05em;
        }

        select {
            width: 100%;
            background: #0a0c0e;
            border: 1px solid var(--border);
            padding: 12px;
            border-radius: 8px;
            color: var(--accent);
            outline: none;
            font-family: inherit;
            cursor: pointer;
        }

        .drop-zone {
            border: 2px dashed var(--border);
            border-radius: 12px;
            padding: 40px 20px;
            text-align: center;
            cursor: pointer;
            transition: 0.2s;
            background: rgba(255, 255, 255, 0.01);
            margin-bottom: 20px;
        }

        .drop-zone:hover { border-color: var(--accent); background: rgba(0, 209, 178, 0.03); }
        .drop-zone span { color: var(--text-dim); font-size: 0.9rem; }

        button {
            width: 100%;
            background: var(--accent);
            color: #000;
            border: none;
            padding: 16px;
            border-radius: 8px;
            font-weight: 700;
            cursor: pointer;
            transition: transform 0.1s;
        }

        button:active { transform: scale(0.98); }
        button:disabled { background: var(--border); color: var(--text-dim); cursor: not-allowed; }

        #log {
            margin-top: 20px;
            font-family: 'SF Mono', monospace;
            font-size: 0.7rem;
            color: var(--accent);
            background: #000;
            padding: 12px;
            border-radius: 8px;
            max-height: 120px;
            overflow-y: auto;
            border: 1px solid var(--border);
            display: none;
        }
    </style>
</head>
<body>

<div class="container">
    <header>
        <h2>Mimic Transform</h2>
        <p>Advanced Bulk Image Conversion</p>
    </header>

    <div class="config-grid">
        <div>
            <label>Convert From</label>
            <select id="inputFormat">
                <option value="all">All Formats</option>
                <option value="png">PNG Only</option>
                <option value="webp">WebP Only</option>
                <option value="jpeg">JPG Only</option>
            </select>
        </div>
        <div>
            <label>Convert To</label>
            <select id="outputFormat">
                <option value="image/webp">WebP</option>
                <option value="image/png">PNG</option>
                <option value="image/jpeg">JPG</option>
            </select>
        </div>
    </div>

    <div class="drop-zone" id="dropZone">
        <span id="label">Drop files or click to upload</span>
        <input type="file" id="fileInput" multiple style="display:none">
    </div>

    <button id="execBtn">Start Transformation</button>
    <div id="log"></div>
</div>

<script src="convert.js"></script>
</body>
</html>
